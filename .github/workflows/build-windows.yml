name: Windows

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - master
  push:
    tags:
      - '*'

jobs:
  build_engine:
    name: Build NLP-ENGINE
    runs-on: windows-latest
    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Vcpkg bootstrap Windows
        run: bootstrap-vcpkg.bat
        working-directory: vcpkg

      - name: Install 3rd Party
        run: vcpkg install
        working-directory: vcpkg

      - name: List $RUNNER_WORKSPACE before build
        shell: pwsh
        run: Get-ChildItem -Path $env:RUNNER_WORKSPACE -Recurse -Force | Select-Object FullName

      - name: Make build directory
        run: mkdir build

      - name: Generate Solution Windows
        run: cmake -B build -A x64 -DCMAKE_TOOLCHAIN_FILE='${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake'

      - name: Cmake Build all targets Windows
        run: cmake --build build --config Release --target nlp

      - name: Test executable --version
        run: ./bin/Release/nlp.exe --version || true

      - name: Copy nlp.exe to nlpw.exe
        run: cp bin/Release/nlp.exe bin/Release/nlpw.exe
        shell: bash

      - name: Upload nlpw.exe
        uses: actions/upload-artifact@v4
        with:
          name: nlpw.exe
          path: bin/Release/nlpw.exe

      - name: Copy ICU DLLs to bin/Release
        shell: pwsh
        run: |
          # lite.lib references icuin78 (Collator) via find_str_nocase; without this DLL
          # downstream analyzer/KB compilation fails with LNK2019.
          Copy-Item "vcpkg/packages/icu_x64-windows/bin/icudt78.dll" "bin/Release/icudt78.dll"
          Copy-Item "vcpkg/packages/icu_x64-windows/bin/icuuc78.dll" "bin/Release/icuuc78.dll"
          Copy-Item "vcpkg/packages/icu_x64-windows/bin/icuin78.dll" "bin/Release/icuin78.dll"

      - name: Upload icudt78.dll
        uses: actions/upload-artifact@v4
        with:
          name: icudt78.dll
          path: bin/Release/icudt78.dll

      - name: Upload icuuc78.dll
        uses: actions/upload-artifact@v4
        with:
          name: icuuc78.dll
          path: bin/Release/icuuc78.dll

      - name: Upload icuin78.dll
        uses: actions/upload-artifact@v4
        with:
          name: icuin78.dll
          path: bin/Release/icuin78.dll

      - name: Package compile libraries (prim/kbm/consh/words/lite)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $outRoot = Join-Path $env:GITHUB_WORKSPACE 'compile-libs'
          $includeRoot = Join-Path $outRoot 'include'
          $libRoot = Join-Path $outRoot 'lib'
          New-Item -ItemType Directory -Force -Path $includeRoot | Out-Null
          New-Item -ItemType Directory -Force -Path $libRoot | Out-Null

          # Header trees used by analyzer/KB generated C++.
          # Keep Api at include/Api so vscode-nlp can add include/Api as an include root.
          New-Item -ItemType Directory -Force -Path (Join-Path $includeRoot 'Api') | Out-Null
          Copy-Item -Recurse -Force 'include/Api/*' (Join-Path $includeRoot 'Api')
          Copy-Item -Recurse -Force 'cs/include' (Join-Path $includeRoot 'cs')

          $requiredLibs = @('prim','kbm','consh','words','lite')
          foreach ($name in $requiredLibs) {
            $lib = Get-ChildItem -Path $env:GITHUB_WORKSPACE -Recurse -File -Filter "$name.lib" |
              Where-Object { $_.FullName -notmatch '\\vcpkg\\' } |
              Select-Object -First 1

            if (-not $lib) {
              throw "Missing required static library: $name.lib"
            }

            Copy-Item -Force $lib.FullName (Join-Path $libRoot "$name.lib")
          }

          Compress-Archive -Path (Join-Path $outRoot '*') -DestinationPath (Join-Path $env:GITHUB_WORKSPACE 'nlpengine-compile-libs.zip') -Force

      - name: Upload nlpengine-compile-libs.zip
        uses: actions/upload-artifact@v4
        with:
          name: nlpengine-compile-libs.zip
          path: nlpengine-compile-libs.zip

      - name: Checkout Analyzers repo
        uses: actions/checkout@v4
        with:
          repository: VisualText/analyzers
          submodules: recursive
          path: analyzers

      - name: List runner workspace
        shell: pwsh
        run: Get-ChildItem -Path $env:RUNNER_WORKSPACE -Recurse -Force | Select-Object FullName

      - name: Run English Parser
        run: ./bin/Release/nlp.exe -ANA .\analyzers\parse-en-us -WORK D:\a\nlp-engine\nlp-engine .\analyzers\parse-en-us\input\doj.txt -DEV || true

      - name: Full English Test
        uses: LouisBrunner/diff-action@v0.2.0
        with:
          old: .github/workflows/tests/parse-en-us/final.tree
          new: ./analyzers/parse-en-us/input/doj.txt_log/final.tree
          mode: addition
          tolerance: same
          output: parse-en-us-diff-win.txt
