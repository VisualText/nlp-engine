name: Move Assets to Release

permissions:
  contents: write
  actions: write

on:
  # Manual re-release: pass an explicit tag (e.g. v3.5.4) to rebuild that
  # release's assets from the exact tagged commit.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)build release assets for, e.g. v3.5.4. Defaults to the latest tag."
        required: false
        type: string
  # Primary trigger: a tag push. We then WAIT for that tag's builds to finish
  # (see "Find workflow run IDs") rather than grabbing whatever build is newest.
  push:
    tags:
    - '*'

# Never let two asset-moves touch the same release at once.
concurrency:
  group: move-assets-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  download_assets:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0  # Fetch all history and tags

    
    - name: Extract tag name and resolve its commit
      id: get_tag
      run: |
        git fetch --tags --force
        if [[ -n "${{ github.event.inputs.tag }}" ]]; then
          # Manual re-release for a specific tag.
          TAG_NAME="${{ github.event.inputs.tag }}"
          echo "Using tag from workflow_dispatch input: $TAG_NAME"
        elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
          # Triggered by a tag push.
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "Using tag from push trigger: $TAG_NAME"
        else
          # Fallback: latest tag.
          TAG_NAME=$(git describe --tags --abbrev=0)
          echo "Using latest tag from repository: $TAG_NAME"
        fi

        if [ -z "$TAG_NAME" ]; then
          echo "ERROR: could not determine a tag to release." >&2
          exit 1
        fi

        # The commit this tag points to. The release MUST attach binaries built
        # from THIS commit, not whatever build happened to be newest -- that bug
        # stapled a 3.5.3 binary onto the v3.5.4 release.
        TAG_SHA=$(git rev-list -n1 "$TAG_NAME")
        echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
        echo "TAG_SHA=$TAG_SHA" >> $GITHUB_ENV
        echo "Selected TAG_NAME=$TAG_NAME -> TAG_SHA=$TAG_SHA"

    - name: Hide any empty pre-existing release during the build wait
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail
        # If a release for this tag was created up front (e.g. via the GitHub UI)
        # it is published but empty until the builds finish ~15 min later. An
        # update-checker hitting /releases/latest (the VS Code NLP++ extension
        # does this) would see a new version with no downloadable assets and
        # break for that window. Mark such a release a draft now; the "Create
        # Release" step below republishes it with assets (draft: false). If a
        # build fails, it safely stays a draft instead of shipping empty.
        rel=$(gh api "repos/${{ github.repository }}/releases/tags/$TAG_NAME" 2>/dev/null || echo '{}')
        is_draft=$(echo "$rel" | jq -r '.draft // empty')
        n_assets=$(echo "$rel" | jq -r '(.assets // []) | length')
        if [ "$is_draft" = "false" ] && [ "${n_assets:-0}" = "0" ]; then
          echo "Release $TAG_NAME is published but empty -> drafting it until assets are ready."
          gh release edit "$TAG_NAME" --repo "${{ github.repository }}" --draft
        else
          echo "Nothing to hide (exists=$([ -n "$is_draft" ] && echo yes || echo no), draft=$is_draft, assets=${n_assets:-0})."
        fi

    - name: Find workflow run IDs for the tagged commit
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail
        # Pick the build run whose head_sha == this tag's commit, and WAIT for it
        # to finish. Previously this grabbed the newest *successful* build of any
        # branch/PR, which stapled a stale (wrong-version) binary onto the
        # release. Each build workflow now triggers on the tag push, so a run for
        # $TAG_SHA exists; we just have to wait for it to go green.
        wait_for_run() {
          local wf="$1"
          local timeout=5400 interval=30 waited=0   # up to 90 min
          while true; do
            local json id pending bad
            json=$(gh api "repos/${{ github.repository }}/actions/workflows/$wf/runs?head_sha=$TAG_SHA&per_page=100" 2>/dev/null || echo '{}')
            id=$(echo "$json" | jq -r '(.workflow_runs // []) | map(select(.conclusion=="success")) | .[0].id // empty')
            if [ -n "$id" ]; then echo "$id"; return 0; fi
            pending=$(echo "$json" | jq -r '(.workflow_runs // []) | map(select(.status!="completed")) | length')
            bad=$(echo "$json" | jq -r '(.workflow_runs // []) | map(select(.conclusion=="failure" or .conclusion=="cancelled" or .conclusion=="timed_out" or .conclusion=="startup_failure")) | .[0].id // empty')
            if [ "$pending" = "0" ] && [ -n "$bad" ]; then
              echo "ERROR: $wf for $TAG_SHA finished without success (run $bad)." >&2
              return 1
            fi
            if [ "$waited" -ge "$timeout" ]; then
              echo "ERROR: timed out after ${timeout}s waiting for a successful $wf run for $TAG_SHA." >&2
              return 1
            fi
            echo "Waiting for $wf build of $TAG_SHA to succeed... (${waited}s elapsed)" >&2
            sleep "$interval"; waited=$((waited+interval))
          done
        }

        WIN_RUN_ID=$(wait_for_run build-windows.yml)
        echo "WIN_RUN_ID=$WIN_RUN_ID" >> $GITHUB_ENV
        LINUX_RUN_ID=$(wait_for_run build-linux.yml)
        echo "LINUX_RUN_ID=$LINUX_RUN_ID" >> $GITHUB_ENV
        MAC_RUN_ID=$(wait_for_run build-macos.yml)
        echo "MAC_RUN_ID=$MAC_RUN_ID" >> $GITHUB_ENV
        ENGINE_RUN_ID=$(wait_for_run build-enginefiles.yml)
        echo "ENGINE_RUN_ID=$ENGINE_RUN_ID" >> $GITHUB_ENV
        VISUAL_RUN_ID=$(wait_for_run build-visualfiles.yml)
        echo "VISUAL_RUN_ID=$VISUAL_RUN_ID" >> $GITHUB_ENV

        echo "Resolved runs for $TAG_SHA: win=$WIN_RUN_ID linux=$LINUX_RUN_ID mac=$MAC_RUN_ID engine=$ENGINE_RUN_ID visual=$VISUAL_RUN_ID"

    # Windows artifacts with specific run ID
    - name: Fetch Windows exe
      uses: dawidd6/action-download-artifact@v8
      with:
        workflow: build-windows.yml
        name: nlpw.exe
        run_id: ${{ env.WIN_RUN_ID }}

    - name: Fetch Windows icu1
      uses: dawidd6/action-download-artifact@v8
      with:
        workflow: build-windows.yml
        name: "icudt78.dll"
        run_id: ${{ env.WIN_RUN_ID }}

    - name: Fetch Windows icu2
      uses: dawidd6/action-download-artifact@v8
      with:
        workflow: build-windows.yml
        name: "icuuc78.dll"
        run_id: ${{ env.WIN_RUN_ID }}

    - name: Fetch Windows icu3 (i18n / Collator)
      uses: dawidd6/action-download-artifact@v8
      with:
        workflow: build-windows.yml
        name: "icuin78.dll"
        run_id: ${{ env.WIN_RUN_ID }}

    - name: Fetch NLP Engine Compile Libraries
      uses: dawidd6/action-download-artifact@v8
      with:
        workflow: build-windows.yml
        name: nlpengine-compile-libs.zip
        run_id: ${{ env.WIN_RUN_ID }}

    - name: Create Linux folders
      run: |
        mkdir -p linux/ubuntu-20.04
        mkdir -p linux/ubuntu-22.04
        mkdir -p linux/ubuntu-latest
    - name: Fetch Linux exe (20.04)
      uses: dawidd6/action-download-artifact@v8
      with:
        workflow: build-linux.yml
        name: nlpl-ubuntu-20.04.exe
        path: ./linux/ubuntu-20.04
        run_id: ${{ env.LINUX_RUN_ID }}

    - name: Fetch Linux exe (22.04)
      uses: dawidd6/action-download-artifact@v8
      with:
        workflow: build-linux.yml
        name: nlpl-ubuntu-22.04.exe
        path: ./linux/ubuntu-22.04
        run_id: ${{ env.LINUX_RUN_ID }}
        
    - name: Fetch Linux exe (latest)
      uses: dawidd6/action-download-artifact@v8
      with:
        workflow: build-linux.yml
        name: nlpl-ubuntu-latest.exe
        path: ./linux/ubuntu-latest
        run_id: ${{ env.LINUX_RUN_ID }}

    - name: Fetch Linux ICU (22.04)
      uses: dawidd6/action-download-artifact@v8
      with:
        workflow: build-linux.yml
        name: libicutu-ubuntu-22.04.a
        path: ./linux/ubuntu-22.04
        run_id: ${{ env.LINUX_RUN_ID }}

    - name: Fetch Linux ICU (22.04)
      uses: dawidd6/action-download-artifact@v8
      with:
        workflow: build-linux.yml
        name: libicuuc-ubuntu-22.04.a
        path: ./linux/ubuntu-22.04
        run_id: ${{ env.LINUX_RUN_ID }}

    - name: Fetch Linux ICU (latest)
      uses: dawidd6/action-download-artifact@v8
      with:
        workflow: build-linux.yml
        name: libicutu-ubuntu-latest.a
        path: ./linux/ubuntu-latest
        run_id: ${{ env.LINUX_RUN_ID }}

    - name: Fetch Linux ICU (latest)
      uses: dawidd6/action-download-artifact@v8
      with:
        workflow: build-linux.yml
        name: libicuuc-ubuntu-latest.a
        path: ./linux/ubuntu-latest
        run_id: ${{ env.LINUX_RUN_ID }}

    - name: Fetch ICU Shared Libraries (20.04)
      uses: dawidd6/action-download-artifact@v8
      with:
        workflow: build-linux.yml
        name: icu-libs-ubuntu-20.04
        path: ./linux/ubuntu-20.04
        run_id: ${{ env.LINUX_RUN_ID }}

    - name: Fetch Linux Compile Libraries (20.04)
      uses: dawidd6/action-download-artifact@v8
      with:
        workflow: build-linux.yml
        name: nlpengine-compile-libs-linux-20.04.zip
        run_id: ${{ env.LINUX_RUN_ID }}

    - name: Fetch Linux Compile Libraries (22.04)
      uses: dawidd6/action-download-artifact@v8
      with:
        workflow: build-linux.yml
        name: nlpengine-compile-libs-linux-22.04.zip
        run_id: ${{ env.LINUX_RUN_ID }}

    - name: Fetch Linux Compile Libraries (latest)
      uses: dawidd6/action-download-artifact@v8
      with:
        workflow: build-linux.yml
        name: nlpengine-compile-libs-linux-latest.zip
        run_id: ${{ env.LINUX_RUN_ID }}

    # MacOS artifacts with specific run ID
    - name: Fetch MacOS exe
      uses: dawidd6/action-download-artifact@v8
      with:
        workflow: build-macos.yml
        name: nlpm.exe
        run_id: ${{ env.MAC_RUN_ID }}
        
    - name: Fetch MacOS libicutum.a
      uses: dawidd6/action-download-artifact@v8
      with:
        workflow: build-macos.yml
        name: libicutum.a
        run_id: ${{ env.MAC_RUN_ID }}

    - name: Fetch MacOS libicuucm.a
      uses: dawidd6/action-download-artifact@v8
      with:
        workflow: build-macos.yml
        name: libicuucm.a
        run_id: ${{ env.MAC_RUN_ID }}

    - name: Fetch MacOS Compile Libraries
      uses: dawidd6/action-download-artifact@v8
      with:
        workflow: build-macos.yml
        name: nlpengine-compile-libs-macos.zip
        run_id: ${{ env.MAC_RUN_ID }}

    # Other artifacts with specific run ID
    - name: Fetch Engine Files
      uses: dawidd6/action-download-artifact@v8
      with:
        workflow: build-enginefiles.yml
        name: "nlpengine.zip"
        run_id: ${{ env.ENGINE_RUN_ID }}

    - name: Fetch VisualText Files
      uses: dawidd6/action-download-artifact@v8
      with:
        workflow: build-visualfiles.yml
        name: "visualtext.zip"
        run_id: ${{ env.VISUAL_RUN_ID }}

    - name: Create Linux Zips
      run: |
        cd linux
        zip -r ubuntu-20.04.zip ubuntu-20.04
        zip -r ubuntu-22.04.zip ubuntu-22.04
        zip -r ubuntu-latest.zip ubuntu-latest
        cd ..
    - name: Check executable versions
      run: |
        echo "Checking executable versions..."
    
        echo "Examining Windows executable for version strings:"
        strings ./nlpw.exe | grep -i version || echo "No version string found in Windows executable"
    
        echo "Examining MacOS executable for file info:"
        file ./nlpm.exe
    
        echo "Windows and Mac file modification times:"
        ls -la ./nlpw.exe ./nlpm.exe ./icudt78.dll ./icuuc78.dll ./libicutum.a ./libicuucm.a
    
        echo "Zipped Linux folders present:"
        ls -la ./linux/*.zip

    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ env.TAG_NAME }}
        name: "Release ${{ env.TAG_NAME }}"
        # Publish (un-draft) now that the assets below are attached. This also
        # re-publishes a release the draft-guard step hid at the start.
        draft: false
        body: |
          NLP Engine Release ${{ env.TAG_NAME }}

          Built from commit ${{ env.TAG_SHA }}

          Build information:
          - Windows build: ${{ env.WIN_RUN_ID }}
          - Linux build: ${{ env.LINUX_RUN_ID }}
          - MacOS build: ${{ env.MAC_RUN_ID }}
        files: |
          ./nlpw.exe
          ./nlpm.exe
          ./icudt78.dll
          ./icuuc78.dll
          ./icuin78.dll
          ./linux/ubuntu-20.04.zip
          ./linux/ubuntu-22.04.zip
          ./linux/ubuntu-latest.zip
          ./libicutum.a
          ./libicuucm.a
          ./nlpengine.zip
          ./nlpengine-compile-libs.zip
          ./nlpengine-compile-libs-linux-20.04.zip
          ./nlpengine-compile-libs-linux-22.04.zip
          ./nlpengine-compile-libs-linux-latest.zip
          ./nlpengine-compile-libs-macos.zip
          ./visualtext.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # Percolate downstream only on a genuine new release (tag push). A manual
    # re-release (workflow_dispatch, e.g. re-attaching an old tag's binary) must
    # NOT re-bump downstream packages to that older engine version.
    - name: Trigger nlp-engine-windows workflow
      if: github.event_name == 'push'
      uses: peter-evans/repository-dispatch@v2
      with:
        token: ${{ secrets.CLASSIC_PAT }}
        repository: VisualText/nlp-engine-windows
        event-type: nlp-engine-release
        client-payload: '{"tag_name": "${{ env.TAG_NAME }}"}'
      continue-on-error: true

    - name: Trigger nlp-engine-mac workflow
      if: github.event_name == 'push'
      uses: peter-evans/repository-dispatch@v2
      with:
        token: ${{ secrets.CLASSIC_PAT }}
        repository: VisualText/nlp-engine-mac
        event-type: nlp-engine-release
        client-payload: '{"tag_name": "${{ env.TAG_NAME }}"}'
      continue-on-error: true

    - name: Trigger nlp-engine-linux workflow
      if: github.event_name == 'push'
      uses: peter-evans/repository-dispatch@v2
      with:
        token: ${{ secrets.CLASSIC_PAT }}
        repository: VisualText/nlp-engine-linux
        event-type: nlp-engine-release
        client-payload: '{"tag_name": "${{ env.TAG_NAME }}"}'
      continue-on-error: true

    # Package repos build the engine from source via their nlp-engine submodule,
    # so an engine release must bump that submodule + republish. See
    # docs/PERCOLATION.md ("nlp-engine -> npm/py packages").
    - name: Trigger py-package-nlpengine workflow
      if: github.event_name == 'push'
      uses: peter-evans/repository-dispatch@v2
      with:
        token: ${{ secrets.CLASSIC_PAT }}
        repository: VisualText/py-package-nlpengine
        event-type: nlp-engine-release
        client-payload: '{"tag_name": "${{ env.TAG_NAME }}"}'
      continue-on-error: true

    - name: Trigger npm-package-nlpengine workflow
      if: github.event_name == 'push'
      uses: peter-evans/repository-dispatch@v2
      with:
        token: ${{ secrets.CLASSIC_PAT }}
        repository: VisualText/npm-package-nlpengine
        event-type: nlp-engine-release
        client-payload: '{"tag_name": "${{ env.TAG_NAME }}"}'
      continue-on-error: true
