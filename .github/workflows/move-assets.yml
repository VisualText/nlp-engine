name: Move Assets to Release

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Windows"]
    types:
    - completed

concurrency:
  group: move-assets-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: false

jobs:
  download_assets:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch != 'master')

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0  # Fetch all history and tags

    
    - name: Extract tag name from ref or get latest tag
      id: get_tag
      env:
        UPSTREAM_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        UPSTREAM_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
      run: |
        if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
          # Triggered by upstream Windows build completing on a tag push
          TAG_NAME="$UPSTREAM_HEAD_BRANCH"
          TARGET_HEAD_SHA="$UPSTREAM_HEAD_SHA"
          echo "Using tag from upstream workflow_run: $TAG_NAME"
          echo "Using head SHA from upstream workflow_run: $TARGET_HEAD_SHA"
        elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
          # When directly triggered by a tag push
          TAG_NAME=${GITHUB_REF#refs/tags/}
          TARGET_HEAD_SHA=$(git rev-list -n 1 "$TAG_NAME")
          echo "Using tag from push trigger: $TAG_NAME"
          echo "Using tag head SHA: $TARGET_HEAD_SHA"
        else
          # When triggered by workflow_dispatch
          # Get the latest tag from the repository
          git fetch --tags
          TAG_NAME=$(git describe --tags --abbrev=0)
          TARGET_HEAD_SHA=$(git rev-parse HEAD)

          # If no tag found, use timestamp
          if [ -z "$TAG_NAME" ]; then
            TIMESTAMP=$(date +'%Y.%m.%d-%H%M')
            TAG_NAME="v${TIMESTAMP}"
            echo "No tag found, using generated version: $TAG_NAME"
          else
            echo "Using latest tag from repository: $TAG_NAME"
          fi
        fi
        
        # Store the tag name for later use
        echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
        echo "TARGET_HEAD_SHA=$TARGET_HEAD_SHA" >> $GITHUB_ENV
        
        # Debug output
        echo "Selected TAG_NAME: $TAG_NAME"
        echo "Selected TARGET_HEAD_SHA: $TARGET_HEAD_SHA"

    - name: Find workflow run IDs
      run: |
        set -euo pipefail
        echo "Resolving workflow run IDs..."
        MAX_PAGES=10
        WAIT_ATTEMPTS=40
        WAIT_SLEEP_SECONDS=30

        WINDOWS_REQUIRED_ARTIFACTS=("nlpw.exe" "icudt78.dll" "icuuc78.dll")
        LINUX_REQUIRED_ARTIFACTS=(
          "nlpl-ubuntu-20.04.exe"
          "nlpl-ubuntu-22.04.exe"
          "nlpl-ubuntu-latest.exe"
          "libicutu-ubuntu-22.04.a"
          "libicuuc-ubuntu-22.04.a"
          "libicutu-ubuntu-latest.a"
          "libicuuc-ubuntu-latest.a"
          "icu-libs-ubuntu-20.04"
        )
        MAC_REQUIRED_ARTIFACTS=("nlpm.exe" "libicutum.a" "libicuucm.a")
        ENGINE_REQUIRED_ARTIFACTS=("nlpengine.zip")
        VISUAL_REQUIRED_ARTIFACTS=("visualtext.zip")

        run_has_required_artifacts() {
          local run_id="$1"
          shift
          local required_artifacts=("$@")
          local artifact_names
          local missing_artifacts=()

          artifact_names=$(gh api "repos/${{ github.repository }}/actions/runs/${run_id}/artifacts?per_page=100" \
            | jq -r '.artifacts[] | select(.expired == false) | .name')

          for artifact_name in "${required_artifacts[@]}"; do
            if ! printf '%s\n' "$artifact_names" | grep -Fxq -- "$artifact_name"; then
              missing_artifacts+=("$artifact_name")
            fi
          done

          if [ "${#missing_artifacts[@]}" -gt 0 ]; then
            echo "Run ${run_id} is missing required artifacts: ${missing_artifacts[*]}" >&2
            return 1
          fi

          return 0
        }

        find_valid_run_with_required_artifacts() {
          local workflow_file="$1"
          shift
          local required_artifacts=("$@")
          local page=1
          while [ "$page" -le "$MAX_PAGES" ]; do
            local run_ids
            if ! run_ids=$(gh api "repos/${{ github.repository }}/actions/workflows/${workflow_file}/runs?status=completed&conclusion=success&head_sha=${TARGET_HEAD_SHA}&per_page=100&page=${page}" \
              | jq -r '.workflow_runs[] | .id'); then
              echo "::error::Failed to query runs for ${workflow_file} (head_sha=${TARGET_HEAD_SHA}, page=${page})"
              return 1
            fi

            [ -z "$run_ids" ] && break

            while read -r run_id; do
              [ -z "$run_id" ] && continue
              if run_has_required_artifacts "$run_id" "${required_artifacts[@]}"; then
                echo "$run_id"
                return 0
              fi
            done <<< "$run_ids"
            page=$((page + 1))
          done
          return 1
        }

        wait_for_run_with_required_artifacts() {
          local workflow_file="$1"
          shift
          local required_artifacts=("$@")
          local run_id=""

          for attempt in $(seq 1 "$WAIT_ATTEMPTS"); do
            echo "Attempt ${attempt}/${WAIT_ATTEMPTS}: searching ${workflow_file} runs for head_sha ${TARGET_HEAD_SHA}..."
            if run_id=$(find_valid_run_with_required_artifacts "$workflow_file" "${required_artifacts[@]}"); then
              echo "$run_id"
              return 0
            fi
            sleep "$WAIT_SLEEP_SECONDS"
          done

          return 1
        }

        set_run_id() {
          local var_name="$1"
          local workflow_file="$2"
          shift 2
          local required_artifacts=("$@")
          case "$var_name" in
            WIN_RUN_ID|LINUX_RUN_ID|MAC_RUN_ID|ENGINE_RUN_ID|VISUAL_RUN_ID) ;;
            *)
              echo "::error::Unknown run-id variable: ${var_name}"
              exit 1
              ;;
          esac
          local -n run_id_ref="$var_name"
          local run_id="${run_id_ref:-}"

          if [ -z "$run_id" ]; then
            run_id=$(wait_for_run_with_required_artifacts "$workflow_file" "${required_artifacts[@]}")
          fi

          if [ -z "$run_id" ]; then
            echo "::error::Unable to find a successful run with required live artifacts for ${workflow_file}: ${required_artifacts[*]}"
            exit 1
          fi

          run_id_ref="$run_id"

          echo "${var_name}=${run_id}" >> "$GITHUB_ENV"
          echo "${var_name}: ${run_id}"
        }

        set_run_id WIN_RUN_ID build-windows.yml "${WINDOWS_REQUIRED_ARTIFACTS[@]}"
        set_run_id LINUX_RUN_ID build-linux.yml "${LINUX_REQUIRED_ARTIFACTS[@]}"
        set_run_id MAC_RUN_ID build-macos.yml "${MAC_REQUIRED_ARTIFACTS[@]}"
        set_run_id ENGINE_RUN_ID build-enginefiles.yml "${ENGINE_REQUIRED_ARTIFACTS[@]}"
        set_run_id VISUAL_RUN_ID build-visualfiles.yml "${VISUAL_REQUIRED_ARTIFACTS[@]}"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # Windows artifacts with specific run ID
    - name: Fetch Windows exe
      uses: dawidd6/action-download-artifact@v8
      with:
        workflow: build-windows.yml
        name: nlpw.exe
        run_id: ${{ env.WIN_RUN_ID }}

    - name: Fetch Windows icu1
      uses: dawidd6/action-download-artifact@v8
      with:
        workflow: build-windows.yml
        name: "icudt78.dll"
        run_id: ${{ env.WIN_RUN_ID }}

    - name: Fetch Windows icu2
      uses: dawidd6/action-download-artifact@v8
      with:
        workflow: build-windows.yml
        name: "icuuc78.dll"
        run_id: ${{ env.WIN_RUN_ID }}

    - name: Create Linux folders
      run: |
        mkdir -p linux/ubuntu-20.04
        mkdir -p linux/ubuntu-22.04
        mkdir -p linux/ubuntu-latest

    - name: Fetch Linux exe (20.04)
      uses: dawidd6/action-download-artifact@v8
      with:
        workflow: build-linux.yml
        name: nlpl-ubuntu-20.04.exe
        path: ./linux/ubuntu-20.04
        run_id: ${{ env.LINUX_RUN_ID }}

    - name: Fetch Linux exe (22.04)
      uses: dawidd6/action-download-artifact@v8
      with:
        workflow: build-linux.yml
        name: nlpl-ubuntu-22.04.exe
        path: ./linux/ubuntu-22.04
        run_id: ${{ env.LINUX_RUN_ID }}
        
    - name: Fetch Linux exe (latest)
      uses: dawidd6/action-download-artifact@v8
      with:
        workflow: build-linux.yml
        name: nlpl-ubuntu-latest.exe
        path: ./linux/ubuntu-latest
        run_id: ${{ env.LINUX_RUN_ID }}

    - name: Fetch Linux ICU (22.04)
      uses: dawidd6/action-download-artifact@v8
      with:
        workflow: build-linux.yml
        name: libicutu-ubuntu-22.04.a
        path: ./linux/ubuntu-22.04
        run_id: ${{ env.LINUX_RUN_ID }}

    - name: Fetch Linux ICU (22.04)
      uses: dawidd6/action-download-artifact@v8
      with:
        workflow: build-linux.yml
        name: libicuuc-ubuntu-22.04.a
        path: ./linux/ubuntu-22.04
        run_id: ${{ env.LINUX_RUN_ID }}

    - name: Fetch Linux ICU (latest)
      uses: dawidd6/action-download-artifact@v8
      with:
        workflow: build-linux.yml
        name: libicutu-ubuntu-latest.a
        path: ./linux/ubuntu-latest
        run_id: ${{ env.LINUX_RUN_ID }}

    - name: Fetch Linux ICU (latest)
      uses: dawidd6/action-download-artifact@v8
      with:
        workflow: build-linux.yml
        name: libicuuc-ubuntu-latest.a
        path: ./linux/ubuntu-latest
        run_id: ${{ env.LINUX_RUN_ID }}

    - name: Fetch ICU Shared Libraries (20.04)
      uses: dawidd6/action-download-artifact@v8
      with:
        workflow: build-linux.yml
        name: icu-libs-ubuntu-20.04
        path: ./linux/ubuntu-20.04
        run_id: ${{ env.LINUX_RUN_ID }}
        
    # MacOS artifacts with specific run ID
    - name: Fetch MacOS exe
      uses: dawidd6/action-download-artifact@v8
      with:
        workflow: build-macos.yml
        name: nlpm.exe
        run_id: ${{ env.MAC_RUN_ID }}
        
    - name: Fetch MacOS libicutum.a
      uses: dawidd6/action-download-artifact@v8
      with:
        workflow: build-macos.yml
        name: libicutum.a
        run_id: ${{ env.MAC_RUN_ID }}

    - name: Fetch MacOS libicuucm.a
      uses: dawidd6/action-download-artifact@v8
      with:
        workflow: build-macos.yml
        name: libicuucm.a
        run_id: ${{ env.MAC_RUN_ID }}

    # Other artifacts with specific run ID
    - name: Fetch Engine Files
      uses: dawidd6/action-download-artifact@v8
      with:
        workflow: build-enginefiles.yml
        name: "nlpengine.zip"
        run_id: ${{ env.ENGINE_RUN_ID }}

    - name: Fetch VisualText Files
      uses: dawidd6/action-download-artifact@v8
      with:
        workflow: build-visualfiles.yml
        name: "visualtext.zip"
        run_id: ${{ env.VISUAL_RUN_ID }}

    - name: Create Linux Zips
      run: |
        cd linux
        zip -r ubuntu-20.04.zip ubuntu-20.04
        zip -r ubuntu-22.04.zip ubuntu-22.04
        zip -r ubuntu-latest.zip ubuntu-latest
        cd ..

    - name: Check executable versions
      run: |
        echo "Checking executable versions..."
    
        echo "Examining Windows executable for version strings:"
        strings ./nlpw.exe | grep -i version || echo "No version string found in Windows executable"
    
        echo "Examining MacOS executable for file info:"
        file ./nlpm.exe
    
        echo "Windows and Mac file modification times:"
        ls -la ./nlpw.exe ./nlpm.exe ./icudt78.dll ./icuuc78.dll ./libicutum.a ./libicuucm.a
    
        echo "Zipped Linux folders present:"
        ls -la ./linux/*.zip

    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ env.TAG_NAME }}
        name: "Release ${{ env.TAG_NAME }}"
        body: |
          NLP Engine Release ${{ env.TAG_NAME }}
        
          Build information:
          - Windows build: ${{ env.WIN_RUN_ID }}
          - Linux build: ${{ env.LINUX_RUN_ID }}
          - MacOS build: ${{ env.MAC_RUN_ID }}
        files: |
          ./nlpw.exe
          ./nlpm.exe
          ./icudt78.dll
          ./icuuc78.dll
          ./linux/ubuntu-20.04.zip
          ./linux/ubuntu-22.04.zip
          ./linux/ubuntu-latest.zip
          ./libicutum.a
          ./libicuucm.a
          ./nlpengine.zip
          ./visualtext.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Trigger nlp-engine-windows workflow
      uses: peter-evans/repository-dispatch@v2
      with:
        token: ${{ secrets.CLASSIC_PAT }}
        repository: VisualText/nlp-engine-windows
        event-type: nlp-engine-release
        client-payload: '{"tag_name": "${{ env.TAG_NAME }}"}'
      continue-on-error: true

    - name: Trigger nlp-engine-mac workflow
      uses: peter-evans/repository-dispatch@v2
      with:
        token: ${{ secrets.CLASSIC_PAT }}
        repository: VisualText/nlp-engine-mac
        event-type: nlp-engine-release
        client-payload: '{"tag_name": "${{ env.TAG_NAME }}"}'
      continue-on-error: true

    - name: Trigger nlp-engine-linux workflow
      uses: peter-evans/repository-dispatch@v2
      with:
        token: ${{ secrets.CLASSIC_PAT }}
        repository: VisualText/nlp-engine-linux
        event-type: nlp-engine-release
        client-payload: '{"tag_name": "${{ env.TAG_NAME }}"}'
      continue-on-error: true  
