name: MaxOS

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
  
jobs:
  build_engine:
    name: Build NLP-ENGINE
    runs-on: macOS-latest
    env:
      VCPKG_DEFAULT_TRIPLET: arm64-osx

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Vcpkg bootstrap Shell
        run: ./bootstrap-vcpkg.sh
        shell: bash
        working-directory: vcpkg

      - name: List $RUNNER_WORKSPACE before build
        run: find $RUNNER_WORKSPACE
        shell: bash

      - name: Install autoconf-archive
        run: brew install autoconf-archive

      - name: Install Brew
        run: brew install automake

      - name: Install 3rd Party
        run: ./vcpkg install
        working-directory: vcpkg

      - name: List $RUNNER_WORKSPACE before build
        run: find $RUNNER_WORKSPACE
        shell: bash

      - name: Make build directory
        run: mkdir build

      - name: Generate Solution MacOs
        # NLP-ENGINE-509: dropped `-DCMAKE_CXX_FLAGS=-std=c++11`. The engine
        # uses std::filesystem (C++17) in lite/dir.cpp::read_files (which
        # loads the analyzer's kb/user/*.{kb,dict,kbb} dictionary files) and
        # in cs/libconsh/cg.cpp / lite/nlp_engine.cpp. With Apple libc++ +
        # -std=c++11, directory_iterator behaved differently from
        # Windows/Linux and the analyzer's user lexicon never got loaded �
        # parse-en-us produced "unknown 1" on every word, blowing up the
        # English-test diff. The engine's CMakeLists already sets
        # CMAKE_CXX_STANDARD 17; let that drive macOS too.
        run: cmake -DCMAKE_BUILD_TYPE=Release -DVCPKG_BUILD_TYPE=release -B build -S . -DCMAKE_TOOLCHAIN_FILE='${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake' -DCMAKE_OSX_ARCHITECTURES=arm64

      - name: Cmake Build all targets MaxOs
        run: cmake --build build/ --target all

      - name: Test executable --version
        run: ./bin/nlp --version || true

      - name: Copy nlp.exe to nlpm.exe
        run: cp bin/nlp bin/nlpm.exe
        shell: bash

      # Upload nlpm.exe
      - name: Upload nlpm.exe
        uses: actions/upload-artifact@v4
        with:
          name: nlpm.exe
          path: bin/nlpm.exe

      - name: Copy libicutu.a to libicutum.a
        run: cp vcpkg_installed/arm64-osx/lib/libicutu.a vcpkg_installed/arm64-osx/lib/libicutum.a
        shell: bash

      - name: Upload libicutum.a
        uses: actions/upload-artifact@v4
        with:
          name: libicutum.a
          path: vcpkg_installed/arm64-osx/lib/libicutum.a

      - name: Copy libicuuc.a to libicuucm.a
        run: cp vcpkg_installed/arm64-osx/lib/libicuuc.a vcpkg_installed/arm64-osx/lib/libicuucm.a
        shell: bash

      - name: Upload libicuucm.a
        uses: actions/upload-artifact@v4
        with:
          name: libicuucm.a
          path: vcpkg_installed/arm64-osx/lib/libicuucm.a

      - name: Package compile libraries (prim/kbm/consh/words/lite)
        shell: bash
        run: |
          set -euo pipefail
          rm -rf compile-libs
          mkdir -p compile-libs/include/Api compile-libs/lib
          cp -R include/Api/ compile-libs/include/Api/
          cp -R cs/include compile-libs/include/cs

          for name in prim kbm consh words lite; do
            lib=$(find "$GITHUB_WORKSPACE" -type f -name "lib${name}.a" \
              -not -path "*/vcpkg/*" -not -path "*/vcpkg_installed/*" \
              -not -path "*/compile-libs/*" | head -n1)
            if [ -z "$lib" ]; then
              echo "Missing required static library: lib${name}.a" >&2
              exit 1
            fi
            cp "$lib" "compile-libs/lib/lib${name}.a"
          done

          # ICU static libs from vcpkg (matches the Windows ICU DLL trio:
          # data/uc/i18n). Downstream analyzer/KB linking against lite needs
          # i18n for Collator (find_str_nocase).
          for icu_lib in libicudata.a libicuuc.a libicui18n.a; do
            cp "vcpkg_installed/arm64-osx/lib/$icu_lib" "compile-libs/lib/$icu_lib"
          done

          (cd compile-libs && zip -r "$GITHUB_WORKSPACE/nlpengine-compile-libs-macos.zip" .)

      - name: Upload nlpengine-compile-libs-macos.zip
        uses: actions/upload-artifact@v4
        with:
          name: nlpengine-compile-libs-macos.zip
          path: nlpengine-compile-libs-macos.zip

      - name: Remove submodule analyzers before fresh checkout
        run: rm -rf analyzers   # drop the pinned submodule copy so the checkout below lands cleanly
        shell: bash

      - name: Checkout Analyzers repo
        uses: actions/checkout@v4
        with:
          repository: VisualText/analyzers
          submodules: recursive
          path: analyzers

      - name: List runner workspace
        run: find $RUNNER_WORKSPACE
        shell: bash

      - name: Run English Parser
        run: ./bin/nlp -ANA ./analyzers/parse-en-us -WORK ./ ./analyzers/parse-en-us/input/doj.txt -DEV || true

      - name: Full English Test
        uses: LouisBrunner/diff-action@v0.2.0
        with:
          old: .github/workflows/tests/parse-en-us/final.tree
          new: ./analyzers/parse-en-us/input/doj.txt_log/final.tree
          mode: addition
          tolerance: same
          output: parse-en-us-diff-mac.txt

