name: Linux

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build_engine:
    name: Build NLP-ENGINE (${{ matrix.display_name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: docker-ubuntu-20.04
            runner: ubuntu-22.04
            version_suffix: "20.04"
            docker_image: "ubuntu:20.04"
            display_name: "ubuntu-20.04"
          - id: ubuntu-22.04
            runner: ubuntu-22.04
            version_suffix: "22.04"
            display_name: "ubuntu-22.04"
          - id: ubuntu-latest
            runner: ubuntu-latest
            version_suffix: "latest"
            display_name: "ubuntu-latest"

    env:
      VCPKG_DEFAULT_TRIPLET: x64-linux
      VERSION_SUFFIX: ${{ matrix.version_suffix }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: true

      # ===============================
      # Ubuntu 20.04 (Docker Build)
      # ===============================
      - name: Build and Run (Ubuntu 20.04)
        if: matrix.id == 'docker-ubuntu-20.04'
        shell: bash
        run: |
          set -euo pipefail
          # Pull the target image directly (with retries) and run the build
          # script in it via the runner's pre-installed Docker. This replaces
          # addnab/docker-run-action@v3, which first builds a docker:20.10
          # helper image -- that Docker Hub pull was intermittently timing out
          # ("failed to resolve docker.io/library/docker:20.10 ... i/o timeout")
          # and failing the whole Linux job.
          for attempt in 1 2 3 4 5; do
            if docker pull ubuntu:20.04; then break; fi
            echo "docker pull ubuntu:20.04 failed (attempt $attempt); retrying in 20s..."
            sleep 20
          done
          docker run --rm \
            --shm-size=512m \
            --mount type=tmpfs,destination=/dev/shm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            ubuntu:20.04 \
            bash scripts/build-ubuntu-2004.sh

      - name: Upload ICU Libraries Zip (20.04)
        if: matrix.id == 'docker-ubuntu-20.04'
        uses: actions/upload-artifact@v4
        with:
          name: icu-libs-ubuntu-${{ env.VERSION_SUFFIX }}
          path: ./icu-libs.zip

      - name: Upload nlpengine-compile-libs zip (20.04)
        if: matrix.id == 'docker-ubuntu-20.04'
        uses: actions/upload-artifact@v4
        with:
          name: nlpengine-compile-libs-linux-${{ env.VERSION_SUFFIX }}.zip
          path: nlpengine-compile-libs-linux-20.04.zip

      # ===============================
      # Non-20.04 (Normal Build)
      # ===============================
      - name: Install Required Dependencies (Non-20.04)
        if: matrix.id != 'docker-ubuntu-20.04'
        run: |
          sudo apt update
          sudo apt install -y autoconf-archive pkg-config python3 ninja-build build-essential cmake g++ git curl zip unzip tar

      - name: Vcpkg Bootstrap Shell (Non-20.04)
        if: matrix.id != 'docker-ubuntu-20.04'
        run: ./bootstrap-vcpkg.sh
        shell: bash
        working-directory: vcpkg

      - name: Install 3rd Party (Non-20.04)
        if: matrix.id != 'docker-ubuntu-20.04'
        run: vcpkg install
        working-directory: vcpkg

      - name: Create Build Directory (Non-20.04)
        if: matrix.id != 'docker-ubuntu-20.04'
        run: mkdir -p build

      - name: Generate Solution Linux (Non-20.04)
        if: matrix.id != 'docker-ubuntu-20.04'
        run: |
          cmake -DCMAKE_BUILD_TYPE=Release \
            -DVCPKG_BUILD_TYPE=release \
            -B build -S . \
            -DCMAKE_TOOLCHAIN_FILE='${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake'

      - name: Cmake Build all targets Linux (Non-20.04)
        if: matrix.id != 'docker-ubuntu-20.04'
        run: cmake --build build/ --target all

      - name: Test executable --version (Non-20.04)
        if: matrix.id != 'docker-ubuntu-20.04'
        run: ./bin/nlp --version || true

      - name: Copy nlp.exe to nlpl.exe (Non-20.04)
        if: matrix.id != 'docker-ubuntu-20.04'
        run: cp bin/nlp bin/nlpl.exe
        shell: bash

      # ===============================
      # Upload Artifacts (All Versions)
      # ===============================
      - name: Upload nlpl.exe
        uses: actions/upload-artifact@v4
        with:
          name: nlpl-ubuntu-${{ env.VERSION_SUFFIX }}.exe
          path: bin/nlpl.exe

      - name: Upload libicutu.a (non ubuntu-20.04)
        if: matrix.id != 'docker-ubuntu-20.04'
        uses: actions/upload-artifact@v4
        with:
          name: libicutu-ubuntu-${{ env.VERSION_SUFFIX }}.a
          path: vcpkg_installed/x64-linux/lib/libicutu.a

      - name: Upload libicuuc.a (ubuntu-20.04)
        if: matrix.id != 'docker-ubuntu-20.04'
        uses: actions/upload-artifact@v4
        with:
          name: libicuuc-ubuntu-${{ env.VERSION_SUFFIX }}.a
          path: vcpkg_installed/x64-linux/lib/libicuuc.a

      - name: Package compile libraries (Non-20.04)
        if: matrix.id != 'docker-ubuntu-20.04'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf compile-libs
          mkdir -p compile-libs/include/Api compile-libs/lib
          cp -r include/Api/. compile-libs/include/Api/
          cp -r cs/include compile-libs/include/cs

          for name in prim kbm consh words lite; do
            lib=$(find "$GITHUB_WORKSPACE" -type f -name "lib${name}.a" \
              -not -path "*/vcpkg/*" -not -path "*/vcpkg_installed/*" \
              -not -path "*/compile-libs/*" | head -n1)
            if [ -z "$lib" ]; then
              echo "Missing required static library: lib${name}.a" >&2
              exit 1
            fi
            cp "$lib" "compile-libs/lib/lib${name}.a"
          done

          # ICU static libs from vcpkg (matches the Windows ICU DLL trio:
          # data/uc/i18n). Downstream analyzer/KB linking against lite needs
          # i18n for Collator (find_str_nocase).
          for icu_lib in libicudata.a libicuuc.a libicui18n.a; do
            cp "vcpkg_installed/x64-linux/lib/$icu_lib" "compile-libs/lib/$icu_lib"
          done

          (cd compile-libs && zip -r "$GITHUB_WORKSPACE/nlpengine-compile-libs-linux-${VERSION_SUFFIX}.zip" .)

      - name: Upload nlpengine-compile-libs zip (Non-20.04)
        if: matrix.id != 'docker-ubuntu-20.04'
        uses: actions/upload-artifact@v4
        with:
          name: nlpengine-compile-libs-linux-${{ env.VERSION_SUFFIX }}.zip
          path: nlpengine-compile-libs-linux-${{ env.VERSION_SUFFIX }}.zip

      # ===============================
      # Run Tests
      # ===============================
      - name: Remove submodule analyzers before fresh checkout (Non-20.04)
        if: matrix.id != 'docker-ubuntu-20.04'
        run: rm -rf analyzers   # drop the pinned submodule copy so the checkout below lands cleanly

      - name: Checkout Analyzers Repo
        if: matrix.id != 'docker-ubuntu-20.04'
        uses: actions/checkout@v4
        with:
          repository: VisualText/analyzers
          submodules: recursive
          path: analyzers

      - name: Full English Test (20.04)
        if: matrix.id == 'docker-ubuntu-20.04'
        uses: LouisBrunner/diff-action@v0.2.0
        with:
          old: .github/workflows/tests/parse-en-us/final.tree
          new: ./rfb-logs/final.tree
          mode: addition
          tolerance: same
          output: parse-en-us-diff-lin.txt

      - name: Run English Parser Test (Non-20.04)
        if: matrix.id != 'docker-ubuntu-20.04'
        run: ./bin/nlp -ANA ./analyzers/parse-en-us -WORK ./ ./analyzers/parse-en-us/input/doj.txt -DEV || true

      - name: Full English Test (Non-20.04)
        if: matrix.id != 'docker-ubuntu-20.04'
        uses: LouisBrunner/diff-action@v0.2.0
        with:
          old: .github/workflows/tests/parse-en-us/final.tree
          new: ./analyzers/parse-en-us/input/doj.txt_log/final.tree
          mode: addition
          tolerance: same
          output: parse-en-us-diff-lin.txt

